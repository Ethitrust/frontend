name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            set -e
            BASE=/var/www/ethitrust
            cd "$BASE"

            if [ -f "$BASE/frontend/package.json" ]; then
              GIT_ROOT="$BASE"
              APP_DIR="$BASE/frontend"
            else
              GIT_ROOT="$BASE"
              APP_DIR="$BASE"
            fi

            cd "$GIT_ROOT"
            git pull origin main

            cd "$APP_DIR"
            npm install
            npm run build

            if [ ! -f .next/standalone/server.js ]; then
              echo "next build did not emit .next/standalone/server.js (check build logs / memory)."
              exit 1
            fi

            # Ensure PM2 uses ecosystem.config.cjs (cwd = .next/standalone)
            pm2 reload "$APP_DIR/ecosystem.config.cjs" --update-env || pm2 start "$APP_DIR/ecosystem.config.cjs"
